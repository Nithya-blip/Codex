<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello, World!</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f7f7ff;
        background: #0b1020;
      }
      body::before, body::after {
        content: "";
        position: fixed;
        width: 34rem;
        height: 34rem;
        border-radius: 50%;
        filter: blur(20px);
        opacity: .65;
        z-index: -1;
        animation: drift 12s ease-in-out infinite alternate;
      }
      body::before { background: #6d4aff; top: -13rem; left: -10rem; }
      body::after { background: #00c6b7; right: -12rem; bottom: -14rem; animation-delay: -5s; }
      main {
        width: min(90vw, 700px);
        padding: clamp(2rem, 6vw, 4.5rem);
        text-align: center;
        background: rgba(15, 20, 42, .62);
        border: 1px solid rgba(255, 255, 255, .18);
        border-radius: 28px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, .38);
        backdrop-filter: blur(18px);
        animation: arrive .8s cubic-bezier(.2,.8,.2,1) both;
      }
      nav { display: flex; justify-content: center; gap: 1.2rem; margin-bottom: 2.6rem; }
      nav a { color: #d9def4; text-decoration: none; font-size: .9rem; font-weight: 700; padding: .5rem .8rem; border-radius: 999px; transition: background .2s, color .2s; }
      nav a:hover, nav a[aria-current="page"] { background: rgba(255,255,255,.12); color: #66f2d8; }
      .spark { font-size: 2.4rem; display: inline-block; animation: wave 2.2s ease-in-out infinite; }
      p { margin: 0 0 1rem; color: #aeb9df; font-size: .88rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(3rem, 10vw, 6.5rem); letter-spacing: -.065em; line-height: .95; }
      h1 span { color: #66f2d8; }
      .subtitle { margin: 1.7rem auto 0; max-width: 31rem; color: #d9def4; font-size: clamp(1rem, 2.5vw, 1.2rem); line-height: 1.65; }
      .line { width: 5rem; height: 4px; margin: 2rem auto 0; border-radius: 999px; background: linear-gradient(90deg, #8972ff, #66f2d8); }
      @keyframes arrive { from { opacity: 0; transform: translateY(24px) scale(.96); } to { opacity: 1; transform: none; } }
      @keyframes drift { to { transform: translate(6rem, 4rem) scale(1.15); } }
      @keyframes wave { 50% { transform: rotate(12deg) scale(1.1); } }
      @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; } }
    </style>
  </head>
  <body>
    <main>
      <nav aria-label="Main navigation">
        <a href="index.html" aria-current="page">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="spark" aria-hidden="true">✦</div>
      <p>A small beginning</p>
      <h1>Hello, <span>Nithya</span></h1>
      <div class="subtitle">A friendly first page, made a little brighter with color, motion, and good typography.</div>
      <div class="line" aria-hidden="true"></div>
    </main>
  </body>
</html>
